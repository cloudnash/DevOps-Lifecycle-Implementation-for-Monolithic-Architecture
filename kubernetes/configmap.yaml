apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-app-config
  namespace: analytics-prod
  labels:
    app: analytics-app
    version: "1.0"
data:
  # Application configuration
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "info"
  DATABASE_HOST: "analytics-db.analytics-prod.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "analytics"
  REDIS_HOST: "analytics-redis.analytics-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Feature flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  ENABLE_HEALTH_CHECK: "true"
  
  # Performance settings
  MAX_CONNECTIONS: "100"
  TIMEOUT: "30s"
  WORKER_THREADS: "4"
